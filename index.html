<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1d1d1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Overtime">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>초과근무 관리 시스템</title>
  <style>
    :root {
      --primary: #0066cc;
      --primary-focus: #0071e3;
      --parchment: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --error: #ff3b30;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      background: var(--parchment);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    input, select, textarea, button {
      font: inherit;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .auth-panel,
    .tab-panel {
      display: none;
    }

    .auth-panel.active,
    .tab-panel.active {
      display: block;
    }

    .auth-tab.active,
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .calendar-day {
      min-height: 76px;
      background: var(--parchment);
      border: 1px solid transparent;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .calendar-day:active {
      transform: scale(0.97);
      background: #e5e5ea;
    }

    .calendar-day.today {
      background: #e8f2fc;
      border-color: var(--primary-focus);
    }

    .calendar-day.selected {
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .calendar-day.not-month {
      opacity: 0.35;
      pointer-events: none;
    }

    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-top: 3px solid #ffffff;
      border-radius: 999px;
      width: 22px;
      height: 22px;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-state {
      background: var(--error) !important;
      border-color: var(--error) !important;
      color: #ffffff !important;
    }

    #print-root {
      display: none;
    }

    @media print {
      body.printing #app-container,
      body.printing #auth-screen,
      body.printing #toast {
        display: none !important;
      }

      body.printing #print-root {
        display: block !important;
        padding: 20px;
        color: #000000;
        font-size: 12px;
      }

      body.printing table {
        width: 100%;
        border-collapse: collapse;
      }

      body.printing th,
      body.printing td {
        border: 1px solid #9ca3af;
        padding: 6px;
        text-align: left;
      }

      body.printing h1,
      body.printing h2 {
        margin: 0 0 12px;
      }
    }
  </style>
</head>
<body class="antialiased">
  <section id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#1d1d1f] px-4 py-6">
    <div class="w-full max-w-md rounded-lg bg-white p-5 shadow-2xl">
      <div class="mb-5 text-center">
        <p class="text-sm font-bold uppercase text-[#0066cc]">Overtime</p>
        <h1 class="mt-1 text-2xl font-bold">계정 로그인</h1>
      </div>

      <div class="mb-5 grid grid-cols-4 border-b border-[#e0e0e0] text-center text-sm">
        <button class="auth-tab active border-b-2 border-transparent py-3 text-[#6e6e73]" type="button" data-auth-tab="login">로그인</button>
        <button class="auth-tab border-b-2 border-transparent py-3 text-[#6e6e73]" type="button" data-auth-tab="signup">회원가입</button>
        <button class="auth-tab border-b-2 border-transparent py-3 text-[#6e6e73]" type="button" data-auth-tab="find">ID 찾기</button>
        <button class="auth-tab border-b-2 border-transparent py-3 text-[#6e6e73]" type="button" data-auth-tab="reset">PW 재설정</button>
      </div>

      <form id="login-panel" class="auth-panel active space-y-3">
        <input id="login-username" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="text" autocomplete="username" placeholder="아이디">
        <input id="login-password" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" autocomplete="current-password" placeholder="비밀번호">
        <button class="flex h-12 w-full items-center justify-center rounded-full bg-[#0066cc] font-semibold text-white active:scale-[0.98]" type="submit">로그인</button>
      </form>

      <form id="signup-panel" class="auth-panel space-y-3">
        <input id="signup-username" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="text" autocomplete="username" placeholder="아이디">
        <input id="signup-name" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="text" autocomplete="name" placeholder="이름">
        <input id="signup-password" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" autocomplete="new-password" placeholder="비밀번호">
        <input id="signup-recovery" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" placeholder="복구코드">
        <input id="signup-code" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" placeholder="가입코드">
        <button class="flex h-12 w-full items-center justify-center rounded-full bg-[#0066cc] font-semibold text-white active:scale-[0.98]" type="submit">가입하고 시작</button>
      </form>

      <form id="find-panel" class="auth-panel space-y-3">
        <input id="find-name" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="text" placeholder="이름">
        <input id="find-recovery" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" placeholder="복구코드">
        <button class="h-12 w-full rounded-full border border-[#0066cc] font-semibold text-[#0066cc] active:scale-[0.98]" type="submit">아이디 찾기</button>
        <p id="find-result" class="min-h-5 text-center text-sm font-semibold text-[#1d1d1f]"></p>
      </form>

      <form id="reset-panel" class="auth-panel space-y-3">
        <input id="reset-username" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="text" placeholder="아이디">
        <input id="reset-recovery" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" placeholder="복구코드">
        <input id="reset-password" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="password" autocomplete="new-password" placeholder="새 비밀번호">
        <button class="h-12 w-full rounded-full border border-[#0066cc] font-semibold text-[#0066cc] active:scale-[0.98]" type="submit">비밀번호 재설정</button>
      </form>

      <p id="auth-message" class="mt-4 min-h-5 text-center text-sm font-semibold text-[#ff3b30]"></p>
    </div>
  </section>

  <div id="app-container" class="hidden min-h-screen w-full bg-white md:mx-auto md:max-w-2xl md:shadow-xl">
    <header class="bg-[#272729] px-4 py-7 text-white md:px-8">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-4xl font-bold leading-tight">Overtime</h1>
          <p class="mt-2 text-base font-semibold text-[#cccccc]">초과근무 기록 시스템</p>
          <p id="user-label" class="mt-3 text-sm text-[#cccccc]"></p>
        </div>
        <button id="logout-btn" class="rounded-full border border-white/30 px-3 py-2 text-sm text-white active:scale-95" type="button">로그아웃</button>
      </div>
    </header>

    <section class="border-b border-[#e0e0e0] bg-white px-4 py-6 md:px-6">
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-lg border border-[#e0e0e0] bg-white p-5 text-center">
          <span class="text-sm font-semibold text-[#6e6e73]">인정 시간</span>
          <div class="mt-1 flex items-baseline justify-center gap-1">
            <span id="sum-approved" class="text-3xl font-bold">-</span>
            <span class="text-sm font-semibold text-[#6e6e73]">h</span>
          </div>
        </div>
        <div class="rounded-lg border border-[#e0e0e0] bg-white p-5 text-center">
          <span class="text-sm font-semibold text-[#6e6e73]">예상 수당</span>
          <span id="sum-pay" class="mt-1 block text-2xl font-bold">₩ -</span>
        </div>
      </div>
      <div class="mt-5 flex items-center justify-between px-1">
        <span class="text-[#6e6e73]">월간 총 누계</span>
        <span id="sum-total" class="text-xl font-bold">-</span>
      </div>
    </section>

    <nav class="sticky top-0 z-30 flex border-b border-[#e0e0e0] bg-[#f5f5f7]/95 backdrop-blur">
      <button id="tab-record" class="tab-btn active flex-1 border-b-2 border-transparent py-4 text-[#6e6e73]" type="button" data-tab="record">기록하기</button>
      <button id="tab-view" class="tab-btn flex-1 border-b-2 border-transparent py-4 text-[#6e6e73]" type="button" data-tab="view">현황보기</button>
    </nav>

    <main class="bg-white px-4 py-8 pb-28 md:px-6">
      <div id="content-record" class="tab-panel active space-y-8">
        <section>
          <div class="mb-3 flex items-center justify-between gap-3">
            <label class="font-bold" for="sheet-select">대상 월</label>
            <button class="rounded-full px-3 py-2 text-sm font-semibold text-[#0066cc] active:bg-blue-50" type="button" data-action="open-new-sheet">+ 새 월</button>
          </div>
          <div class="grid grid-cols-[1fr_auto] gap-2">
            <select id="sheet-select" class="h-12 rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]">
              <option value="">데이터 로딩 중...</option>
            </select>
            <button id="lock-toggle-btn" class="h-12 rounded-lg border border-[#d2d2d7] px-3 text-sm font-bold text-[#1d1d1f]" type="button" data-action="toggle-lock">마감</button>
          </div>
          <p id="lock-label" class="mt-2 text-sm font-semibold text-[#6e6e73]"></p>
        </section>

        <section class="rounded-lg border border-[#e0e0e0] bg-white p-5">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-lg font-bold">방과후 요일</h2>
            <button id="btn-save-days" class="rounded-full bg-[#0066cc] px-5 py-2 text-sm font-semibold text-white active:scale-95" type="button" data-action="save-days">저장</button>
          </div>
          <div id="afterschool-container" class="grid grid-cols-7 gap-1.5"></div>
        </section>

        <section class="space-y-5">
          <div class="flex items-center justify-between gap-3">
            <h2 class="text-2xl font-bold">근무 상세</h2>
            <div class="flex gap-2">
              <button class="rounded-full border border-[#0066cc] px-3 py-2 text-sm font-semibold text-[#0066cc] active:scale-95" type="button" data-action="quick-start">지금 시작</button>
              <button class="rounded-full border border-[#0066cc] px-3 py-2 text-sm font-semibold text-[#0066cc] active:scale-95" type="button" data-action="quick-end">지금 종료</button>
            </div>
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-[#6e6e73]" for="date-input">날짜</label>
            <input id="date-input" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 outline-none focus:border-[#0071e3]" type="date">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <label class="block text-sm font-bold text-[#6e6e73]">시작 시간
              <input id="start-time" class="mt-2 h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-3 text-center text-[#1d1d1f] outline-none focus:border-[#0071e3]" type="time">
            </label>
            <label class="block text-sm font-bold text-[#6e6e73]">종료 시간
              <input id="end-time" class="mt-2 h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-3 text-center text-[#1d1d1f] outline-none focus:border-[#0071e3]" type="time">
            </label>
          </div>

          <div>
            <label class="mb-2 block text-sm font-bold text-[#6e6e73]" for="memo-input">메모</label>
            <div id="reason-buttons" class="mb-2 flex flex-wrap gap-2"></div>
            <textarea id="memo-input" class="min-h-24 w-full resize-y rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 py-3 text-[#1d1d1f] outline-none focus:border-[#0071e3]" placeholder="사유를 직접 입력하거나 버튼을 눌러 추가하세요."></textarea>
          </div>

          <div id="result-panel" class="hidden rounded-lg border border-[#e0e0e0] bg-[#f5f5f7] p-5">
            <div class="grid grid-cols-3 gap-3 text-center">
              <div><span class="text-xs font-bold uppercase text-[#6e6e73]">아침</span><strong id="res-morning" class="mt-1 block text-xl">0:00</strong></div>
              <div><span class="text-xs font-bold uppercase text-[#6e6e73]">오후</span><strong id="res-afternoon" class="mt-1 block text-xl">0:00</strong></div>
              <div><span class="text-xs font-bold uppercase text-[#6e6e73]">일계</span><strong id="res-total" class="mt-1 block text-xl text-[#0066cc]">0:00</strong></div>
            </div>
          </div>

          <button id="btn-submit" class="flex h-12 w-full items-center justify-center rounded-full bg-[#0066cc] font-semibold text-white active:scale-[0.98]" type="button" data-action="save-overtime">기록 저장하기</button>
        </section>
      </div>

      <div id="content-view" class="tab-panel space-y-8">
        <section>
          <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
            <h2 id="calendar-title" class="text-3xl font-bold">현황</h2>
            <div class="flex gap-2">
              <button class="rounded-full border border-[#0066cc] px-3 py-2 text-sm font-semibold text-[#0066cc] active:scale-95" type="button" data-action="download-csv">CSV</button>
              <button class="rounded-full border border-[#0066cc] px-3 py-2 text-sm font-semibold text-[#0066cc] active:scale-95" type="button" data-action="print-pdf">PDF</button>
            </div>
          </div>
          <div class="mb-3 grid grid-cols-7 text-center text-xs font-bold uppercase text-[#6e6e73]">
            <div class="text-[#ff3b30]">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-[#0066cc]">Sat</div>
          </div>
          <div id="calendar-body" class="calendar-grid"></div>
        </section>

        <section id="date-detail" class="rounded-lg border border-[#e0e0e0] bg-white p-5">
          <p class="text-sm font-semibold text-[#6e6e73]">날짜를 선택하세요.</p>
        </section>

        <section class="rounded-lg border border-[#e0e0e0] bg-white p-5">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-lg font-bold">최근 수정 이력</h2>
            <button class="rounded-full px-3 py-2 text-sm font-semibold text-[#0066cc] active:bg-blue-50" type="button" data-action="refresh-history">새로고침</button>
          </div>
          <div id="history-list" class="space-y-3"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="newSheetModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
    <div class="w-full max-w-sm rounded-lg bg-white p-6 shadow-2xl">
      <h2 class="mb-2 text-2xl font-bold">새 월 시트</h2>
      <p class="mb-6 text-sm text-[#6e6e73]">예: 26-5 또는 2026-5</p>
      <input id="newSheetName" class="h-12 w-full rounded-lg border border-[#d2d2d7] bg-[#f5f5f7] px-4 text-center font-semibold outline-none focus:border-[#0071e3]" type="text" placeholder="YY-M">
      <div class="mt-6 grid grid-cols-2 gap-3">
        <button class="h-12 rounded-full border border-[#0066cc] font-semibold text-[#0066cc] active:scale-95" type="button" data-action="close-new-sheet">취소</button>
        <button id="btn-create-sheet" class="h-12 rounded-full bg-[#0066cc] font-semibold text-white active:scale-95" type="button" data-action="create-sheet">생성</button>
      </div>
    </div>
  </div>

  <div id="toast" class="pointer-events-none fixed bottom-5 left-1/2 z-50 hidden w-[calc(100%-32px)] max-w-sm -translate-x-1/2 rounded-lg bg-[#1d1d1f] px-4 py-3 text-center text-sm font-semibold text-white shadow-xl"></div>
  <div id="print-root"></div>

  <script>
    const API_URL = '/api/overtime';
    const TOKEN_KEY = 'overtime-app-token';
    const USER_KEY = 'overtime-app-user';
    const REASONS = ['회의', '생활지도', '방과후', '행사', '상담', '기타'];

    let authToken = sessionStorage.getItem(TOKEN_KEY) || '';
    let authUser = readStoredUser();
    let currentAfterSchoolState = [];
    let currentSheetRecords = {};
    let allSheetData = {};
    let currentHistory = [];
    let selectedDateKey = '';

    const $ = (selector) => document.querySelector(selector);

    document.addEventListener('DOMContentLoaded', init);

    function init() {
      document.addEventListener('click', handleDocumentClick);
      document.querySelectorAll('.auth-tab').forEach((button) => button.addEventListener('click', () => switchAuthTab(button.dataset.authTab)));
      $('#login-panel').addEventListener('submit', login);
      $('#signup-panel').addEventListener('submit', signup);
      $('#find-panel').addEventListener('submit', findUsername);
      $('#reset-panel').addEventListener('submit', resetPassword);
      $('#logout-btn').addEventListener('click', logout);
      $('#sheet-select').addEventListener('change', changeSheet);
      $('#date-input').addEventListener('change', loadDateDetail);
      renderReasonButtons();
      registerServiceWorker();

      if (authToken) {
        hideAuth();
        loadAppData();
      } else {
        showAuth();
      }
    }

    function readStoredUser() {
      try {
        return JSON.parse(sessionStorage.getItem(USER_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function switchAuthTab(name) {
      document.querySelectorAll('.auth-tab').forEach((button) => button.classList.toggle('active', button.dataset.authTab === name));
      document.querySelectorAll('.auth-panel').forEach((panel) => panel.classList.toggle('active', panel.id === `${name}-panel`));
      $('#auth-message').textContent = '';
    }

    async function login(event) {
      event.preventDefault();
      setAuthMessage('');
      const result = await fetchAPI('login', {
        username: $('#login-username').value,
        password: $('#login-password').value,
      }, { publicRequest: true });
      if (result.error) return setAuthMessage(result.error);
      acceptAuth(result);
      showToast('로그인했습니다.');
    }

    async function signup(event) {
      event.preventDefault();
      setAuthMessage('');
      const result = await fetchAPI('signup', {
        username: $('#signup-username').value,
        displayName: $('#signup-name').value,
        password: $('#signup-password').value,
        recoveryCode: $('#signup-recovery').value,
        signupCode: $('#signup-code').value,
      }, { publicRequest: true });
      if (result.error) return setAuthMessage(result.error);
      acceptAuth(result);
      showToast('계정을 만들었습니다.');
    }

    async function findUsername(event) {
      event.preventDefault();
      setAuthMessage('');
      const result = await fetchAPI('findUsername', {
        displayName: $('#find-name').value,
        recoveryCode: $('#find-recovery').value,
      }, { publicRequest: true });
      if (result.error) return setAuthMessage(result.error);
      $('#find-result').textContent = result.usernames?.length ? `아이디: ${result.usernames.join(', ')}` : '일치하는 아이디가 없습니다.';
    }

    async function resetPassword(event) {
      event.preventDefault();
      setAuthMessage('');
      const result = await fetchAPI('resetPassword', {
        username: $('#reset-username').value,
        recoveryCode: $('#reset-recovery').value,
        newPassword: $('#reset-password').value,
      }, { publicRequest: true });
      if (result.error) return setAuthMessage(result.error);
      switchAuthTab('login');
      showToast('비밀번호를 재설정했습니다.');
    }

    function acceptAuth(result) {
      authToken = result.token;
      authUser = result.user;
      sessionStorage.setItem(TOKEN_KEY, authToken);
      sessionStorage.setItem(USER_KEY, JSON.stringify(authUser));
      hideAuth();
      applyAppData(result);
    }

    function logout() {
      authToken = '';
      authUser = null;
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(USER_KEY);
      showAuth();
    }

    function showAuth() {
      $('#auth-screen').classList.remove('hidden');
      $('#auth-screen').classList.add('flex');
      $('#app-container').classList.add('hidden');
    }

    function hideAuth() {
      $('#auth-screen').classList.add('hidden');
      $('#auth-screen').classList.remove('flex');
      $('#app-container').classList.remove('hidden');
    }

    function setAuthMessage(message) {
      $('#auth-message').textContent = message;
    }

    async function fetchAPI(action, payload = {}, options = {}) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(options.publicRequest ? {} : { Authorization: `Bearer ${authToken}` }),
          },
          body: JSON.stringify({ action, ...payload }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.error) throw Object.assign(new Error(data.error || data.message || `요청 실패 (${response.status})`), { code: data.code, data });
        return data;
      } catch (error) {
        if (error.code === 'UNAUTHORIZED') logout();
        return { error: error.message || '네트워크 오류가 발생했습니다.', code: error.code, data: error.data };
      }
    }

    async function loadAppData() {
      const data = await fetchAPI('getInitialAppData');
      if (data.error) return showToast(`데이터 로딩 실패: ${data.error}`);
      applyAppData(data);
    }

    function applyAppData(data) {
      if (data.user) {
        authUser = data.user;
        sessionStorage.setItem(USER_KEY, JSON.stringify(authUser));
      }
      allSheetData = data;
      currentHistory = data.history || [];
      updateUserLabel();
      updateSheetSelect(data);
      updatePage(data);
      renderHistory();
    }

    function updateUserLabel() {
      $('#user-label').textContent = authUser ? `${authUser.displayName} (${authUser.username})` : '';
    }

    async function changeSheet() {
      const sheetName = $('#sheet-select').value;
      if (!sheetName) return;
      const data = await fetchAPI('getSheetData', { sheetName });
      if (data.error) return showToast(`시트 로딩 실패: ${data.error}`);
      applyAppData({ ...allSheetData, ...data, currentSheet: sheetName });
    }

    function updateSheetSelect(data) {
      const sheetSelect = $('#sheet-select');
      sheetSelect.innerHTML = '';
      if (!data.sheetNames || !data.sheetNames.length) {
        sheetSelect.innerHTML = '<option value="">월 시트 없음</option>';
        return;
      }
      data.sheetNames.forEach((name) => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = `${name} 시트`;
        option.selected = name === data.currentSheet;
        sheetSelect.appendChild(option);
      });
    }

    function updatePage(data) {
      updateSummary(data.summary);
      currentSheetRecords = data.records || {};
      renderAfterSchoolChips(data.afterSchool || []);
      updateLockUi();
      setDefaultDateFromSheet();
      loadDateDetail();
      renderCalendar();
      renderSelectedDateDetail();
    }

    function updateSummary(summary = {}) {
      $('#sum-total').textContent = summary.totalHours || '0:00';
      $('#sum-approved').textContent = summary.approvedHours || '0';
      $('#sum-pay').textContent = summary.totalPay ? `₩ ${summary.totalPay}` : '₩ 0';
    }

    function updateLockUi() {
      const locked = Boolean(allSheetData.locked);
      $('#lock-toggle-btn').textContent = locked ? '해제' : '마감';
      $('#lock-label').textContent = locked ? '마감된 월입니다. 저장 시 비밀번호 재입력이 필요합니다.' : '수정 가능한 월입니다.';
      $('#lock-label').className = `mt-2 text-sm font-semibold ${locked ? 'text-[#ff3b30]' : 'text-[#6e6e73]'}`;
    }

    function renderAfterSchoolChips(afterSchool) {
      const container = $('#afterschool-container');
      container.innerHTML = '';
      currentAfterSchoolState = afterSchool.map((item) => item.isSelected);
      afterSchool.forEach((item, index) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.textContent = item.day;
        chip.className = chipClass(currentAfterSchoolState[index]);
        chip.addEventListener('click', () => {
          currentAfterSchoolState[index] = !currentAfterSchoolState[index];
          chip.className = chipClass(currentAfterSchoolState[index]);
        });
        container.appendChild(chip);
      });
    }

    function chipClass(active) {
      return `h-10 rounded-lg text-sm font-bold transition ${active ? 'bg-[#1d1d1f] text-white' : 'border border-[#d2d2d7] bg-[#f5f5f7] text-[#1d1d1f]'}`;
    }

    function renderReasonButtons() {
      $('#reason-buttons').innerHTML = REASONS.map((reason) => `<button type="button" class="rounded-full border border-[#d2d2d7] px-3 py-1.5 text-sm font-semibold text-[#1d1d1f]" data-reason="${reason}">${reason}</button>`).join('');
    }

    function setDefaultDateFromSheet() {
      const sheetName = $('#sheet-select').value;
      const now = new Date();
      let year = now.getFullYear();
      let month = now.getMonth() + 1;
      let day = now.getDate();
      const parts = sheetName.split('-');
      if (parts.length === 2) {
        year = Number(parts[0]) + 2000;
        month = Number(parts[1]);
        if (year !== now.getFullYear() || month !== now.getMonth() + 1) day = 1;
      }
      $('#date-input').value = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function loadDateDetail() {
      const dateText = parseDateInput($('#date-input').value);
      const detail = currentSheetRecords[dateText];
      const now = new Date();
      const currentTime = toTimeValue(now);
      const isAM = now.getHours() < 12;
      if (detail) {
        $('#start-time').value = formatTimeInput(detail.startTime) || (isAM ? currentTime : '');
        $('#end-time').value = formatTimeInput(detail.endTime) || (!isAM ? currentTime : '');
        $('#memo-input').value = detail.memo || '';
        if (detail.startTime || detail.endTime || detail.dailyTotal !== '0:00') showResult(detail);
        else hideResult();
        return;
      }
      $('#start-time').value = isAM ? currentTime : '';
      $('#end-time').value = !isAM ? currentTime : '';
      $('#memo-input').value = '';
      hideResult();
    }

    function showResult(result) {
      $('#result-panel').classList.remove('hidden');
      $('#res-morning').textContent = result.morningExtra || '0:00';
      $('#res-afternoon').textContent = result.afternoonExtra || '0:00';
      $('#res-total').textContent = result.dailyTotal || '0:00';
    }

    function hideResult() {
      $('#result-panel').classList.add('hidden');
    }

    function handleDocumentClick(event) {
      const reasonButton = event.target.closest('[data-reason]');
      if (reasonButton) appendReason(reasonButton.dataset.reason);

      const tabButton = event.target.closest('[data-tab]');
      if (tabButton) switchTab(tabButton.dataset.tab);

      const button = event.target.closest('[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      if (action === 'save-days') saveAfterSchool();
      if (action === 'save-overtime') submitOvertime();
      if (action === 'quick-start') quickSave('start');
      if (action === 'quick-end') quickSave('end');
      if (action === 'download-csv') downloadMonthCsv();
      if (action === 'print-pdf') printMonthReport();
      if (action === 'refresh-history') refreshHistory();
      if (action === 'open-new-sheet') showModal();
      if (action === 'close-new-sheet') hideModal();
      if (action === 'create-sheet') confirmCreateSheet();
      if (action === 'toggle-lock') toggleMonthLock();
      if (action === 'edit-selected-date') editSelectedDate();
    }

    function appendReason(reason) {
      const memo = $('#memo-input');
      const parts = memo.value.split(',').map((item) => item.trim()).filter(Boolean);
      if (!parts.includes(reason)) parts.push(reason);
      memo.value = parts.join(', ');
      memo.focus();
    }

    function switchTab(tab) {
      const isRecord = tab === 'record';
      $('#tab-record').classList.toggle('active', isRecord);
      $('#tab-view').classList.toggle('active', !isRecord);
      $('#content-record').classList.toggle('active', isRecord);
      $('#content-view').classList.toggle('active', !isRecord);
      if (!isRecord) renderCalendar();
    }

    async function submitOvertime(source = 'manual', overridePassword = '') {
      const sheetName = $('#sheet-select').value;
      const dateText = parseDateInput($('#date-input').value);
      if (!sheetName || !dateText) return showToast('시트와 날짜를 확인해 주세요.');
      const payload = { sheetName, dateText, startTime: $('#start-time').value, endTime: $('#end-time').value, memo: $('#memo-input').value.trim(), source };
      if (overridePassword) payload.overridePassword = overridePassword;
      const data = await fetchAPI('saveOvertime', payload);
      if (data.code === 'MONTH_LOCKED') return retryWithPassword((password) => submitOvertime(source, password));
      if (!data.success) return showToast(data.message || data.error || '저장에 실패했습니다.');
      applyAppData({ ...allSheetData, ...data, currentSheet: sheetName });
      showResult(currentSheetRecords[dateText] || {});
      showToast('저장했습니다.');
    }

    async function quickSave(kind) {
      const now = new Date();
      $('#date-input').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const dateText = parseDateInput($('#date-input').value);
      const existing = currentSheetRecords[dateText] || {};
      const currentTime = toTimeValue(now);
      $('#start-time').value = kind === 'start' ? currentTime : formatTimeInput(existing.startTime);
      $('#end-time').value = kind === 'end' ? currentTime : formatTimeInput(existing.endTime);
      $('#memo-input').value = existing.memo || $('#memo-input').value;
      await submitOvertime(kind === 'start' ? 'quick-start' : 'quick-end');
    }

    async function saveAfterSchool(overridePassword = '') {
      const sheetName = $('#sheet-select').value;
      if (!sheetName) return;
      const payload = { sheetName, settings: currentAfterSchoolState };
      if (overridePassword) payload.overridePassword = overridePassword;
      const data = await fetchAPI('saveAfterSchoolSettings', payload);
      if (data.code === 'MONTH_LOCKED') return retryWithPassword((password) => saveAfterSchool(password));
      if (!data.success) return showToast(data.message || data.error || '저장에 실패했습니다.');
      applyAppData({ ...allSheetData, ...data, currentSheet: sheetName });
      showToast('방과후 요일을 저장했습니다.');
    }

    async function confirmCreateSheet() {
      const targetName = $('#newSheetName').value.trim();
      if (!targetName) return;
      const data = await fetchAPI('createNewMonthSheet', { targetName });
      if (!data.success) return showToast(data.message || data.error || '시트 생성에 실패했습니다.');
      hideModal();
      $('#newSheetName').value = '';
      applyAppData(data);
      showToast(`${data.newSheetName} 시트를 만들었습니다.`);
    }

    async function toggleMonthLock() {
      const sheetName = $('#sheet-select').value;
      if (!sheetName) return;
      if (allSheetData.locked) {
        const password = window.prompt('마감 해제를 위해 비밀번호를 다시 입력해 주세요.');
        if (!password) return;
        const data = await fetchAPI('unlockMonth', { sheetName, password });
        if (!data.success) return showToast(data.error || '마감 해제에 실패했습니다.');
        applyAppData(data);
        showToast('마감을 해제했습니다.');
      } else {
        const data = await fetchAPI('lockMonth', { sheetName });
        if (!data.success) return showToast(data.error || '마감에 실패했습니다.');
        applyAppData(data);
        showToast('월을 마감했습니다.');
      }
    }

    function retryWithPassword(callback) {
      const password = window.prompt('마감된 월입니다. 수정하려면 비밀번호를 입력해 주세요.');
      if (!password) return;
      callback(password);
    }

    async function refreshHistory() {
      const data = await fetchAPI('getHistory');
      if (data.error) return showToast(`이력 로딩 실패: ${data.error}`);
      currentHistory = data.history || [];
      renderHistory();
      renderSelectedDateDetail();
      showToast('수정 이력을 새로고침했습니다.');
    }

    function renderCalendar() {
      const sheetName = $('#sheet-select').value;
      const calendarBody = $('#calendar-body');
      if (!calendarBody || !sheetName || !sheetName.includes('-')) return;
      const [yy, monthText] = sheetName.split('-');
      const year = Number(yy) + 2000;
      const month = Number(monthText);
      $('#calendar-title').textContent = `${year}년 ${month}월`;
      calendarBody.innerHTML = '';
      const firstDay = new Date(year, month - 1, 1).getDay();
      const lastDate = new Date(year, month, 0).getDate();
      const prevMonthLastDate = new Date(year, month - 1, 0).getDate();
      for (let index = firstDay - 1; index >= 0; index -= 1) {
        const div = document.createElement('div');
        div.className = 'calendar-day not-month';
        div.innerHTML = `<span class="text-sm">${prevMonthLastDate - index}</span>`;
        calendarBody.appendChild(div);
      }
      const now = new Date();
      for (let day = 1; day <= lastDate; day += 1) {
        const dateKey = `${month}월${day}일`;
        const record = currentSheetRecords[dateKey];
        const dayOfWeek = new Date(year, month - 1, day).getDay();
        const div = document.createElement('button');
        div.type = 'button';
        div.className = `calendar-day ${selectedDateKey === dateKey ? 'selected' : ''}`;
        if (now.getFullYear() === year && now.getMonth() + 1 === month && now.getDate() === day) div.classList.add('today');
        const dayColor = dayOfWeek === 0 ? 'text-[#ff3b30]' : dayOfWeek === 6 ? 'text-[#0066cc]' : 'text-[#1d1d1f]';
        let content = `<span class="text-base font-bold ${dayColor}">${day}</span>`;
        if (record) {
          content += '<div class="mt-1.5 flex gap-1">';
          if (record.morningExtra && record.morningExtra !== '0:00') content += '<span class="h-1.5 w-1.5 rounded-full bg-[#ff9500]"></span>';
          if (record.afternoonExtra && record.afternoonExtra !== '0:00') content += '<span class="h-1.5 w-1.5 rounded-full bg-[#0066cc]"></span>';
          if (record.memo) content += '<span class="h-1.5 w-1.5 rounded-full bg-[#34c759]"></span>';
          content += '</div>';
          if (record.dailyTotal && record.dailyTotal !== '0:00') content += `<span class="mt-1 text-xs font-bold">${escapeHtml(record.dailyTotal)}</span>`;
        }
        div.innerHTML = content;
        div.addEventListener('click', () => {
          selectedDateKey = dateKey;
          renderCalendar();
          renderSelectedDateDetail();
        });
        calendarBody.appendChild(div);
      }
    }

    function renderSelectedDateDetail() {
      const container = $('#date-detail');
      if (!selectedDateKey) {
        container.innerHTML = '<p class="text-sm font-semibold text-[#6e6e73]">날짜를 선택하세요.</p>';
        return;
      }
      const record = currentSheetRecords[selectedDateKey] || {};
      const dateHistory = currentHistory.filter((item) => item.sheetName === $('#sheet-select').value && item.dateText === selectedDateKey);
      container.innerHTML = `
        <div class="mb-4 flex items-center justify-between gap-3">
          <div>
            <p class="text-sm font-semibold text-[#6e6e73]">${escapeHtml($('#sheet-select').value)} 시트</p>
            <h2 class="text-2xl font-bold">${escapeHtml(selectedDateKey)}</h2>
          </div>
          <button class="rounded-full bg-[#0066cc] px-4 py-2 text-sm font-semibold text-white" type="button" data-action="edit-selected-date">수정</button>
        </div>
        <div class="grid grid-cols-2 gap-3 text-sm">
          ${detailMetric('시작', record.startTime || '-')}
          ${detailMetric('종료', record.endTime || '-')}
          ${detailMetric('아침', record.morningExtra || '0:00')}
          ${detailMetric('오후', record.afternoonExtra || '0:00')}
          ${detailMetric('일계', record.dailyTotal || '0:00')}
          ${detailMetric('메모', record.memo || '-')}
        </div>
        <div class="mt-5">
          <h3 class="mb-2 text-sm font-bold text-[#6e6e73]">이 날짜의 수정 이력</h3>
          ${dateHistory.length ? dateHistory.slice(0, 5).map(historyCard).join('') : '<p class="text-sm text-[#6e6e73]">수정 이력이 없습니다.</p>'}
        </div>
      `;
    }

    function detailMetric(label, value) {
      return `<div class="rounded-lg bg-[#f5f5f7] p-3"><span class="text-xs font-bold text-[#6e6e73]">${label}</span><strong class="mt-1 block">${escapeHtml(value)}</strong></div>`;
    }

    function editSelectedDate() {
      if (!selectedDateKey) return;
      const sheetName = $('#sheet-select').value;
      const [yy, monthText] = sheetName.split('-');
      const day = Number(selectedDateKey.replace(/^\d+월/, '').replace('일', ''));
      $('#date-input').value = `${Number(yy) + 2000}-${String(Number(monthText)).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      loadDateDetail();
      switchTab('record');
    }

    function renderHistory() {
      const historyList = $('#history-list');
      if (!historyList) return;
      if (!currentHistory.length) {
        historyList.innerHTML = '<p class="text-sm text-[#6e6e73]">아직 기록된 수정 이력이 없습니다.</p>';
        return;
      }
      historyList.innerHTML = currentHistory.slice(0, 12).map(historyCard).join('');
    }

    function historyCard(item) {
      return `
        <article class="mb-2 rounded-lg border border-[#e0e0e0] bg-[#f5f5f7] p-3">
          <div class="flex items-start justify-between gap-3">
            <strong class="text-sm">${escapeHtml(item.action || '-')}</strong>
            <span class="shrink-0 text-xs text-[#6e6e73]">${escapeHtml(item.timestamp || '')}</span>
          </div>
          <p class="mt-1 text-sm">${escapeHtml([item.sheetName, item.dateText].filter(Boolean).join(' · '))}</p>
          <p class="mt-1 text-xs text-[#6e6e73]">${escapeHtml(item.detail || item.memo || '')}</p>
        </article>
      `;
    }

    function buildExportRows() {
      const sheetName = $('#sheet-select').value;
      return (allSheetData.dates || []).map((date) => {
        const key = date.key || normalizeDate(date.dateText);
        const record = currentSheetRecords[key] || {};
        return { sheetName, dateText: date.dateText, startTime: record.startTime || '', endTime: record.endTime || '', morningExtra: record.morningExtra || '0:00', afternoonExtra: record.afternoonExtra || '0:00', dailyTotal: record.dailyTotal || '0:00', memo: record.memo || '' };
      });
    }

    function downloadMonthCsv() {
      const rows = buildExportRows();
      if (!rows.length) return showToast('내보낼 데이터가 없습니다.');
      const header = ['월', '날짜', '시작', '종료', '아침 초과', '오후 초과', '일계', '메모'];
      const csvRows = rows.map((row) => [row.sheetName, row.dateText, row.startTime, row.endTime, row.morningExtra, row.afternoonExtra, row.dailyTotal, row.memo]);
      const csv = [header, ...csvRows].map((row) => row.map(csvEscape).join(',')).join('\n');
      const blob = new Blob([`\uFEFF${csv}`], { type: 'text/csv;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `overtime_${$('#sheet-select').value}_${timestamp()}.csv`;
      document.body.append(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
      showToast('CSV를 저장했습니다.');
    }

    function printMonthReport() {
      const rows = buildExportRows();
      if (!rows.length) return showToast('인쇄할 데이터가 없습니다.');
      $('#print-root').innerHTML = `
        <h1>초과근무 월별 보고서</h1>
        <h2>${escapeHtml($('#sheet-select').value)} 시트</h2>
        <table><thead><tr><th>날짜</th><th>시작</th><th>종료</th><th>아침</th><th>오후</th><th>일계</th><th>메모</th></tr></thead>
        <tbody>${rows.map((row) => `<tr><td>${escapeHtml(row.dateText)}</td><td>${escapeHtml(row.startTime)}</td><td>${escapeHtml(row.endTime)}</td><td>${escapeHtml(row.morningExtra)}</td><td>${escapeHtml(row.afternoonExtra)}</td><td>${escapeHtml(row.dailyTotal)}</td><td>${escapeHtml(row.memo)}</td></tr>`).join('')}</tbody></table>
      `;
      document.body.classList.add('printing');
      window.print();
      setTimeout(() => document.body.classList.remove('printing'), 500);
    }

    function showModal() {
      $('#newSheetModal').classList.remove('hidden');
      $('#newSheetModal').classList.add('flex');
      setTimeout(() => $('#newSheetName').focus(), 50);
    }

    function hideModal() {
      $('#newSheetModal').classList.add('hidden');
      $('#newSheetModal').classList.remove('flex');
    }

    function showToast(message) {
      const toast = $('#toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.add('hidden'), 2600);
    }

    function parseDateInput(value) {
      if (!value) return '';
      const [, month, day] = value.split('-');
      if (!month || !day) return '';
      return `${Number(month)}월${Number(day)}일`;
    }

    function normalizeDate(value) {
      return String(value || '').replace(/\s+/g, '');
    }

    function formatTimeInput(value) {
      if (!value) return '';
      const text = String(value);
      if (!text.includes(':')) return text;
      const [hour, minute] = text.split(':');
      return `${hour.padStart(2, '0')}:${String(minute || '00').padStart(2, '0')}`;
    }

    function toTimeValue(date) {
      return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function timestamp() {
      const date = new Date();
      const pad = (value) => String(value).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.register('/sw.js').catch((error) => console.warn('Service worker registration failed:', error));
    }
  </script>
</body>
